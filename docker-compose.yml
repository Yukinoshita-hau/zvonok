services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/zvonok
      SPRING_DATASOURCE_USERNAME: zvonok
      SPRING_DATASOURCE_PASSWORD: zvonok
      APP_JWT_SECRET: please-change-this-secret
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zvonok
      POSTGRES_USER: rashid
      POSTGRES_PASSWORD: rashid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

